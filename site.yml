---
- name: Bootstrap URFU server storage paths
  hosts: urfu-server
  gather_facts: false
  become: true
  tasks:
    - name: Create URFU Ansible temporary directory on large disk
      ansible.builtin.raw: |
        mkdir -p /mnt/sdd/.ansible-malkerov/tmp
        chown -R malkerov:malkerov /mnt/sdd/.ansible-malkerov
        chmod 700 /mnt/sdd/.ansible-malkerov
        chmod 700 /mnt/sdd/.ansible-malkerov/tmp

    - name: Create URFU Docker and Ollama directories on large disk
      ansible.builtin.raw: |
        mkdir -p /mnt/sdd/docker
        mkdir -p /mnt/sdd/llm/ollama/compose
        mkdir -p /mnt/sdd/llm/ollama/data
        chown -R root:root /mnt/sdd/docker
        chown -R root:root /mnt/sdd/llm
        chmod 755 /mnt/sdd/docker
        chmod 755 /mnt/sdd/llm
        chmod 755 /mnt/sdd/llm/ollama
        chmod 755 /mnt/sdd/llm/ollama/compose
        chmod 755 /mnt/sdd/llm/ollama/data

    - name: Check URFU server disk space before setup
      ansible.builtin.raw: |
        root_avail_mb=$(df -Pm / | awk 'NR==2 {print $4}')
        sdd_avail_mb=$(df -Pm /mnt/sdd | awk 'NR==2 {print $4}')

        if [ "$root_avail_mb" -lt 2048 ]; then
          echo "ERROR: root filesystem / has less than 2GB free: ${root_avail_mb}MB"
          exit 1
        fi

        if [ "$sdd_avail_mb" -lt 102400 ]; then
          echo "ERROR: /mnt/sdd has less than 100GB free: ${sdd_avail_mb}MB"
          exit 1
        fi

- name: Prepare Ubuntu host for LLM workloads
  hosts: llm_nodes
  become: true
  gather_facts: true

  pre_tasks:
    - name: Decide whether to use custom Python runtime
      ansible.builtin.set_fact:
        llm_use_custom_python: >-
          {{
            (llm_python_mode == 'custom')
            or
            (
              llm_python_mode == 'auto'
              and ansible_distribution == 'Ubuntu'
              and ansible_distribution_version is version('24.04', '<')
            )
          }}

    - name: Define selected Python binary for runtimes
      ansible.builtin.set_fact:
        llm_selected_python_binary: >-
          {{
            llm_custom_python_binary
            if (llm_use_custom_python | bool)
            else llm_system_python_binary
          }}

    - name: Show selected strategy
      ansible.builtin.debug:
        msg:
          - "group_names={{ group_names }}"
          - "llm_enable_gpu_stack={{ llm_enable_gpu_stack }}"
          - "llm_manage_docker={{ llm_manage_docker }}"
          - "llm_manage_nvidia_driver={{ llm_manage_nvidia_driver }}"
          - "llm_manage_nvidia_container_toolkit={{ llm_manage_nvidia_container_toolkit }}"
          - "ollama_container_use_gpu={{ ollama_container_use_gpu }}"
          - "llm_python_mode={{ llm_python_mode }}"
          - "llm_use_custom_python={{ llm_use_custom_python }}"
          - "llm_selected_python_binary={{ llm_selected_python_binary }}"
    
  roles:
    - role: ubuntu_base
      tags:
        - ubuntu_base
        - base

    - role: ubuntu_base_nvidia_host
      when: llm_enable_gpu_stack | bool
      tags:
        - ubuntu_nvidia_host
        - nvidia_host

    - role: docker_engine
      when: llm_manage_docker | bool
      tags:
        - docker_engine
        - docker

    - role: nvidia_container_toolkit
      when:
        - llm_enable_gpu_stack | bool
        - llm_manage_nvidia_container_toolkit | bool
      tags:
        - nvidia_container_toolkit
        - nvidia_docker
        - gpu_containers

    - role: python_runtime
      when: llm_use_custom_python | bool
      vars:
        python_runtime_install_prefix: "{{ llm_custom_python_binary | regex_replace('/bin/python[0-9.]+$', '') }}"
        python_runtime_python_binary: "{{ llm_custom_python_binary }}"
      tags:
        - python_runtime
        - python
        - python311

    - role: python_project_packages #new role for LLMOPs
      vars:
        python_project_packages_python_binary: "{{ llm_selected_python_binary }}"
      tags:
        - python_project_packages
        - python_packages
        - project_python

    - role: ollama_container
      tags:
        - ollama_container
        - ollama

    - role: ollama_pull_models
      tags:
        - ollama_pull_models
        - ollama_models
        - pull_models

    # === НОВОЕ: RAG agent backend (зависит от Ollama + моделей) ===
    - role: rag_agent
      when: rag_agent_enable | bool
      tags:
        - rag_agent
        - rag



    # === НОВОЕ: Open WebUI с защитой Nemo Guardrails ===
    # Заменяет старую роль ollama_webui (удалена из проекта).
    - role: open_webui_guardrails
      when: open_webui_enable | bool
      tags:
        - open_webui_guardrails
        - open_webui
        - webui
        - ui

    - role: monitoring_stack
      tags:
        - monitoring_stack
        - monitoring

    - role: garak_runner
      vars:
        garak_runner_use_custom_python: "{{ llm_use_custom_python }}"
        garak_runner_custom_python_binary: "{{ llm_custom_python_binary }}"
        garak_runner_system_python_binary: "{{ llm_system_python_binary }}"
      tags:
        - garak_runner
        - garak

    - role: langchain_runtime
      vars:
        langchain_runtime_python_binary: "{{ llm_selected_python_binary }}"
      tags:
        - langchain_runtime
        - langchain
        - python_packages

    - role: platform_users
      tags:
        - platform_users
        - users
        - access
