---
# ============================================================
# defaults/main.yml
# Значения по умолчанию для роли nvidia_container_toolkit.
# ============================================================

nvidia_container_toolkit_prerequisite_packages:
  - ca-certificates
  - curl
  - gnupg

nvidia_container_toolkit_packages:
  - nvidia-container-toolkit

nvidia_container_toolkit_keyring_path: /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
nvidia_container_toolkit_repo_list_url: https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list

nvidia_container_toolkit_run_gpu_test: true
nvidia_container_toolkit_test_image: nvidia/cuda:12.4.1-base-ubuntu24.04